# OcuTrace Configuration
# All configurable values live here — no hardcoded values in code.

camera:
  device_index: 0
  frame_width: 640
  frame_height: 480
  target_fps: 30

tracking:
  # MediaPipe FaceLandmarker
  model_path: models/face_landmarker.task
  max_num_faces: 1
  min_detection_confidence: 0.5
  min_presence_confidence: 0.5
  min_tracking_confidence: 0.5
  # Iris landmark indices
  left_iris_index: 468
  right_iris_index: 473

glasses_detection:
  # Quality gate thresholds
  jitter_threshold_px: 2.0
  min_detection_rate: 0.95
  quality_window_frames: 90  # 3 seconds at 30fps

storage:
  backend: sqlite
  sqlite:
    database_path: data/ocutrace.db
  mariadb:
    host: localhost
    port: 3306
    user: ocutrace
    password: ocutrace
    database: ocutrace

saccade_detection:
  # Savitzky-Golay filter (window=3 for 30fps webcam; use 5 for 60fps+)
  smoothing_window: 3
  smoothing_polyorder: 2
  # Velocity thresholds (degrees/second)
  # Lowered from clinical 30/20 for webcam iris tracking (~14px range)
  onset_velocity_threshold: 20.0
  offset_velocity_threshold: 10.0
  min_onset_frames: 1  # 1 frame sufficient at 30fps with amplitude check
  min_saccade_amplitude_deg: 2.0  # reject noise-triggered detections < 2 deg

paradigm:
  # Gap antisaccade protocol
  fixation_duration_ms: 1000
  gap_duration_ms: 200
  stimulus_duration_ms: 1500
  iti_min_ms: 1000
  iti_max_ms: 1500
  stimulus_eccentricity_deg: 10.0
  n_antisaccade_trials: 40
  n_prosaccade_trials: 20

display:
  # Monitor physical properties (needed for degree-based units)
  screen_width_cm: 53.0         # physical screen width in cm
  viewing_distance_cm: 60.0     # subject-to-screen distance in cm
  screen_resolution: [1920, 1080]

calibration:
  n_points: 9
  point_duration_ms: 2000
  max_acceptable_error_deg: 3.0
