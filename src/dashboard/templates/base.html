<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OcuTrace Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        h1 { color: #38bdf8; margin-bottom: 1.5rem; font-size: 1.8rem; }
        h2 { color: #7dd3fc; margin-bottom: 1rem; font-size: 1.4rem; }
        a { color: #38bdf8; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .card { background: #1e293b; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #334155; }
        .metric { display: inline-block; margin-right: 2rem; margin-bottom: 0.5rem; }
        .metric-value { font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        .metric-label { font-size: 0.85rem; color: #94a3b8; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 0.75rem; border-bottom: 2px solid #334155; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 0.75rem; border-bottom: 1px solid #1e293b; }
        tr:hover { background: #1e293b; }
        .ok { color: #4ade80; }
        .err { color: #f87171; }
        .na { color: #64748b; }
        .plot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
        .plot-grid img { width: 100%; border-radius: 8px; background: #1e293b; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .badge-anti { background: #1e3a5f; color: #7dd3fc; }
        .badge-pro { background: #3b2f1e; color: #fbbf24; }
        .nav { margin-bottom: 2rem; }
        .nav a { margin-right: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
